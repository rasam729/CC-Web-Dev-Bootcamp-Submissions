<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TickTask Board</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <h1 class="logo">TickTask</h1>
    </header>

    <div class="app-container">
        <h1>My Tasks</h1>
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="Enter task description...">
            <button id="add-btn">+</button>
        </div>
        <ol id="todo-list"></ol>
    </div>
    <script src="connect.js"></script>
</body>
</html>
